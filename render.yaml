services:
  - type: web
    name: shl-assessment-recommender
    env: python
    buildCommand: "pip install -r requirements.txt && python scripts/build_catalog.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
    healthCheckPath: /health
